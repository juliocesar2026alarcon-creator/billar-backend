<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Control de Billar – Billar Jade</title>

    <!-- (Opcional) Tailwind por CDN solo para prototipos -->
    <!-- Si luego compilas Tailwind en tu build, puedes quitar este CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- (Opcional) Tus estilos embebidos: los que mostraste en la captura -->
    <style>
      /* === Solo aplica dentro de la tarjeta de cada mesa (no toca el panel derecho) === */
      .rounded-2xl.border.shadow-sm.p-3 {
        min-height: 240px; /* altura mínima prolija */
      }

      /* === Rejilla interna de la mesa ocupada (ESCRITORIO) ===
         2 columnas estables: izquierda 62% (tiempo/tarifa/acciones) y derecha 38% (cliente/productos) */
      .rounded-2xl.border.shadow-sm.p-3 .grid.grid-cols-2 {
        display: grid !important;
        grid-template-columns: 62% 38%;
        gap: 10px;
        align-items: start; /* anclar arriba */
      }

      /* Ambas columnas permiten encoger su contenido (clave p/evitar empujes) */
      .rounded-2xl.border.shadow-sm.p-3 .grid.grid-cols-2 > * {
        min-width: 0;
      }

      /* Encabezados y textos; ajusta si quieres más contraste */
      .drop-shadow { filter: drop-shadow(0 1px 1px rgba(0,0,0,.25)); }
    </style>
  </head>

  <body class="min-h-screen">
    <div id="root"></div>

    <!-- 👇 ESTA LÍNEA ES CLAVE PARA QUE ARRANQUE LA APP DE REACT CON VITE -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
